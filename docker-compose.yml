services:
  # ─── Backend (Node.js / Express) ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: iqv-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  # ─── Frontend (React / Vite → Nginx) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Pass the API URL at build time so Vite can embed it
        VITE_API_URL: http://localhost:5001
    container_name: iqv-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
